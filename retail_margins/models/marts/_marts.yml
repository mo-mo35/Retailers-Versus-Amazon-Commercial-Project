version: 2

models:
  - name: mart_margin_trends
    description: "Annual margin and revenue data per retailer for trend visualisation."
    columns:
      - name: company
        tests: [not_null]
      - name: fiscal_year
        tests: [not_null]
      - name: gross_margin_pct
        tests: [not_null]

  - name: mart_yoy_changes
    description: "Year-on-year margin and revenue change per retailer."
    columns:
      - name: company
        tests: [not_null]
      - name: fiscal_year
        tests: [not_null]

  - name: mart_resilience_scores
    description: "Aggregate resilience metrics per retailer across the full period."
    columns:
      - name: company
        tests:
          - not_null
          - unique
      - name: resilience_rating
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["High", "Medium", "Low"]